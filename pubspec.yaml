name: poes_arkanoid
description: A South African themed Arkanoid clone built with Flutter and Flame.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.22.0
  flame_audio: ^2.10.0
  cloud_firestore: ^5.6.0
  firebase_core: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/characters/
    - assets/images/items/
    - assets/images/bricks/
    - assets/images/levels/
    - assets/audio/
    - assets/levels/
